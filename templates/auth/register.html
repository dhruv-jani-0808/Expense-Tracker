{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block page_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="card">
      <div class="card-header">
        <div class="auth-logo">✨</div>
        <h3>Create Account</h3>
        <p class="mb-0 mt-1" style="color:rgba(255,255,255,0.75); font-size:0.88rem;">Join Expense Tracker today</p>
      </div>
      <div class="card-body">
        <form action="{{ url_for('auth.register') }}" method="POST" class="mt-1">

          <div class="mb-3">
            <label for="username" class="form-label">
              <i class="bi bi-person me-1"></i>Username
            </label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Choose a username" required autofocus>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-1"></i>Email Address
            </label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="you@example.com" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              <i class="bi bi-lock me-1"></i>Password
            </label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Create a strong password" required>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label">
              <i class="bi bi-shield-check me-1"></i>Confirm Password
            </label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   placeholder="Re-enter your password" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
          </div>

        </form>
      </div>
      <div class="card-footer">
        <small>Already have an account?
          <a href="{{ url_for('auth.login') }}">Sign in here</a>
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
