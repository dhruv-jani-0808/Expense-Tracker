{% extends 'base.html' %}
{% block title %}{{ legend }} Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7 col-md-9">

    <!-- Back link -->
    <div class="mb-3">
      <a href="{{ url_for('expense.index') }}" style="color:var(--text-muted); text-decoration:none; font-size:0.9rem;">
        <i class="bi bi-arrow-left me-1"></i>Back to Expenses
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="bi bi-{% if legend == 'Add' %}plus-circle{% else %}pencil-square{% endif %} me-2"
           style="color:var(--primary-light)"></i>
        {{ legend }} Expense
      </div>
      <div class="card-body">
        <form method="POST" action="">

          <div class="mb-3">
            <label for="date" class="form-label">
              <i class="bi bi-calendar3 me-1"></i>Date
            </label>
            <input type="date" class="form-control" id="date" name="date"
                   value="{{ expense.date if expense else '' }}" required>
          </div>

          <div class="mb-3">
            <label for="category" class="form-label">
              <i class="bi bi-tag me-1"></i>Category
            </label>
            <select class="form-select" id="category" name="category" required>
              <option value="" disabled {% if not expense %}selected{% endif %}>Select a category...</option>
              {% for cat in categories %}
                <option value="{{ cat.id }}"
                  {% if expense and expense.category_id == cat.id %}selected{% endif %}>
                  {{ cat.name }}
                </option>
              {% endfor %}
            </select>
            <div class="form-text mt-1">
              <a href="{{ url_for('category.index') }}" style="color:var(--primary-light)">
                <i class="bi bi-plus-circle me-1"></i>Manage categories
              </a>
            </div>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">
              <i class="bi bi-chat-text me-1"></i>Description
            </label>
            <input type="text" class="form-control" id="description" name="description"
                   placeholder="e.g., Groceries, Uber, Coffee"
                   value="{{ expense.description if expense else '' }}" required>
          </div>

          <div class="mb-4">
            <label for="amount" class="form-label">
              <i class="bi bi-currency-rupee me-1"></i>Amount (₹)
            </label>
            <input type="number" step="0.01" min="0" class="form-control" id="amount" name="amount"
                   placeholder="0.00"
                   value="{{ expense.amount if expense else '' }}" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-{% if legend == 'Add' %}plus-lg{% else %}check-lg{% endif %} me-1"></i>
              {{ legend }} Expense
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
